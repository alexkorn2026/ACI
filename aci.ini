# ACI - Automated Code Inspection
# Standard-Parameter (Default-Werte).
#
# Diese Datei ist optional. Fehlt sie, gelten die werkseitigen
# Vorgaben. Ist sie vorhanden, ueberschreiben ihre Werte die Vorgaben.
# Ein ausdruecklich gesetzter Kommandozeilen-Schalter hat weiterhin
# Vorrang vor dieser Datei.
#
# ACI sucht die Datei im aktuellen Arbeitsverzeichnis und im
# Projektverzeichnis. Der HTML-Report zeigt in der Tabelle
# "Scan-Konfiguration" je Parameter den verwendeten Wert und den hier
# festgelegten Default - so ist erkennbar, ob vom Default abgewichen
# wurde.
#
# Fuer CI/CD gibt es zusaetzlich fertige Voreinstellungen ueber den
# Kommandozeilen-Schalter --profile (advisory / ci / strict / audit);
# damit muss man die Schalter unten nicht einzeln zusammenstellen.
#
# Diese Datei dient zugleich als Vorlage: jeder Parameter ist hier mit
# seinem werkseitigen Default eingetragen und kommentiert.

[defaults]

# SQL-Dialekt: oracle, postgresql
dialect = oracle

# Pruefgruppe(n): all, security, guidelines
group = all

# Ausgabeformate, kommagetrennt: console, json, html, sarif, codeclimate
format = console

# Nur Findings ab diesem Schweregrad ausgeben:
# info, minor, warning, major, high, critical, blocker
min_level = info

# Exit-Code 1, wenn Findings >= Schweregrad (CI/CD); none deaktiviert.
fail_on = none

# Zeilen Quelltext-Kontext pro Finding (0 = kein Kontext).
context_lines = 3

# Keinen Quelltext-Kontext in den Report aufnehmen.
no_context = false

# Einfache Geheimnis-Muster im Report-Kontext maskieren.
redact_secrets = false

# Absolute Pfade im Report anonymisieren (Verzeichnis -> <PATH>,
# Dateiname bleibt erhalten). Von safe_report impliziert.
redact_paths = false

# Sichere CI-Artefakte: no_context und redact_secrets gemeinsam.
safe_report = false

# Bei SQL-Injection- und dynamischen DDL-Findings die Taint-Quelle
# als zusaetzliche Fundstelle anzeigen: die Zuweisung(en) bzw. den
# Prozedur-/Funktionskopf, aus dem der verwendete Wert stammt.
# Mit --no-taint-sources abschaltbar.
taint_sources = true

# Symbolischen Verknuepfungen folgen.
follow_symlinks = false

# Dateien ueber dieser Groesse ueberspringen (z.B. 5MB, 500KB).
# Leer = kein Limit.
max_file_size =

# Zielverzeichnis fuer JSON-/HTML-Reports.
output_dir = .

# Gruppierung der Findings im HTML-Report:
#   rule = nach Regel gruppiert (Dateipfad je Fundstelle), Standard
#   file = nach Datei gruppiert
html_group_by = rule

# Exit-Code 2, wenn ein Check intern fehlschlaegt (Werkzeugfehler).
# false = nur Hinweis, der Scan laeuft weiter.
strict_internal_errors = false

# Pfad zu einer Waiver-Datei (JSON) mit kontrollierten Ausnahmen.
# Gewaiverte Findings bleiben im Report sichtbar, zaehlen aber nicht
# fuer --fail-on. Leer = keine Waiver-Datei.
waivers =

# Exit-Code 2, wenn die Waiver-Datei fehlerhaft ist.
# false = nur Warnung, der Scan laeuft weiter.
strict_waivers = false

# Exit-Code 2, wenn eine Regeldatei aus einem benutzerdefinierten
# (nicht mit ACI gebuendelten) Pfad geladen wuerde - schuetzt den
# CI-Gate vor eingeschleusten oder manipulierten Regeln.
require_trusted_rules = false

# Verlangt eine feste Regelsatz-Bindung (--expected-ruleset-sha256 oder
# --ruleset-lock). Fehlt sie, Exit-Code 2. Vom strict-Profil gesetzt.
# "Gebuendelter Pfad" allein garantiert keine unveraenderten Regeln.
require_ruleset_pin = false

# Scan-Vollstaendigkeit: advisory = uebersprungene/nicht lesbare/nicht
# dekodierbare Dateien sind nur ein Hinweis; strict = Exit-Code 2, wenn
# nicht jede Zieldatei geprueft wurde (ein CI-Gate darf nicht stumm ueber
# ungeprueften Code "bestanden" melden).
scan_completeness = advisory

# Feinsteuerung (unabhaengig von scan_completeness): Exit-Code 2 bei nicht
# lesbaren Pfaden bzw. wegen Groessenlimit/Exclude uebersprungenen Dateien.
fail_on_access_error = false
fail_on_skipped_file = false

# Quelltext-Kodierung erzwingen (leer = Auto: BOM, sonst utf-8) und Umgang
# mit nicht dekodierbaren Bytes: replace (Ersatzzeichen) oder strict (Datei
# gilt als ungeprueft und zaehlt fuer die Scan-Vollstaendigkeit).
encoding =
encoding_errors = replace

# Reproduzierbarer Report: nicht-deterministische Felder (Zeitstempel,
# Dauer, Plattform, absolute Pfade) weglassen, sodass der Report bei
# unveraendertem Code/Regeln byte-identisch bleibt.
reproducible_report = false

# Safe-Modus auch auf Konsolen-/stderr-Hinweise anwenden (Pfade maskieren) -
# CI-Konsolenlogs werden oft laenger aufbewahrt als die Artefakte.
safe_console = false

# Inline-Suppressions (-- aci:ignore) muessen Governance-Metadaten tragen
# (ticket=, reason=) und duerfen nicht abgelaufen (expires=) oder ungueltig
# sein; sonst Exit-Code 2. Verhindert dauerhafte, unbegruendete Ausnahmen.
strict_suppressions = false
